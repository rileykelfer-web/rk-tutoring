[[faq]]
question = "What subjects do you tutor?"
answer = "I specialize in English topics from elementary school to college; however, I also frequently support students with Math topics through Pre-algebra, as well as any other core subjects like History and Science."

[[faq]]
question = "Where do sessions take place?"
answer = "Most families prefer to host tutoring sessions at their home. When hosting is not preferable for a family, I offer use of a dedicated office space (weekends only) in Mueller, or a nearby public library. Certain schools in the area allow me to tutor on their premises, on account of my holding active tutoring insurance."

[[faq]]
question = "What is your cancellation policy?"
answer = "I require 24 hours' notice for cancellations to avoid a session fee."

[[faq]]
question = "How do you calculate your rates?"
answer = "It depends on the service(s) requested, as my associated prep time can vary greatly. For a given service, I start with a base rate and apply a standard formula for travel time. I strive to make sure the cost of tutoring does not strain any family situation."

[[faq]]
question = "What is your pay structure?"
answer = "I am flexible in regard to families' preference for payment cadence within a given block of sessions. Some families prefer to pay ahead for a set number of sessions. A detailed breakdown of pay structure can be found in each specific tutoring contract, which I prepare following our first consultation."

[[faq]]
question = "Do you tutor remotely?"
answer = "Yes! Depending on the situation and family needs, I conduct sessions via Zoom for students both in and outside of Austin."
